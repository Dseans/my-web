<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anata no Gallery</title>
    <link rel="prefetch" href="gallery.html">
    <link rel="prefetch" href="styleG.css">
    <link rel="stylesheet" href="style.css">
    <script>
    function playSound() {
        const sound = document.getElementById("hover-sound");
        sound.currentTime = 0; 
        sound.play().catch(error => {
            console.log("Audio waiting for user interaction.");
        });
    }
    </script>
</head>
<body>

    <audio id="hover-sound" src="hover.mp3" preload="auto"></audio>
    <script>
        document.getElementById("hover-sound").volume = 0.1; 
    </script>

    <header>
        <p class="logo">Anata no Gyarari</p>
        <nav>
            <a href="index.html" onmouseover="playSound()">Home</a>
            <a href="gallery.html" onmouseover="playSound()">Gallery</a>
            <a href="#about" onmouseover="playSound()">About</a>
        </nav>
    </header>

    <main>
        <div class="heart-container">
            <div class="heart"></div>
        </div>
    </main>

</body>
</html>
