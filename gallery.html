<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anata no Gallery</title>
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="style.css">
    <link rel="stylesheet" href="styleG.css">
    
    <script>
    function playSound() {
        const sound = document.getElementById("hover-sound");
        sound.currentTime = 0; 
        sound.play().catch(error => {
            console.log("Audio waiting for user interaction.");
        });
    }
    </script>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="bg-music" src="nca.mp3" autoplay loop></audio>
    <audio id="hover-sound" src="hover.mp3" preload="auto"></audio>

    <script>
        // Set volume levels
        document.getElementById("hover-sound").volume = 0.1;
        document.getElementById("bg-music").volume = 0.025;
    </script>

    <header>
        <p class="logo">Anata no Gyarari</p>
        <nav>
            <a href="index.html" onmouseover="playSound()">Home</a>
            <a href="gallery.html" onmouseover="playSound()">Gallery</a>
            <a href="about.html" onmouseover="playSound()">About</a>
        </nav>
    </header>

    <main class="gallery-container">
        <img src="1.gif" class="gallery-item">
        <img src="2.gif" class="gallery-item">
        <img src="3.gif" class="gallery-item">
        <img src="4.gif" class="gallery-item">
        <img src="5.gif" class="gallery-item">
        <img src="6.jpg" class="gallery-item">
        <img src="7.jpg" class="gallery-item">
        <img src="8.jpg" class="gallery-item">
        <img src="9.jpg" class="gallery-item">

</body>
</html>
